# Alembic 설정 파일
# 이 파일은 backend/ 디렉토리에서 실행하는 것을 기준으로 합니다.
#
# 사용 예시 (backend/ 디렉토리에서):
#   alembic revision --autogenerate -m "initial"
#   alembic upgrade head
#   alembic downgrade -1
#   alembic history --verbose

[alembic]
# 마이그레이션 스크립트 위치
script_location = alembic

# 마이그레이션 파일명 형식: 날짜시간_설명.py
file_template = %%(year)d%%(month).2d%%(day).2d_%%(hour).2d%%(minute).2d_%%(rev)s_%%(slug)s

# 소스 경로 (app/ 패키지를 찾기 위해)
prepend_sys_path = .

# 타임존: UTC
timezone = UTC

# 메타데이터 트렁케이션 길이 (긴 컬럼명 대응)
truncate_slug_length = 40

# 비동기 DB URL 오버라이드 (env.py에서 settings에서 자동 로드)
# sqlalchemy.url은 env.py에서 동적으로 주입되므로 여기서는 미사용
# sqlalchemy.url = postgresql+asyncpg://user:pass@localhost/realestate

[post_write_hooks]
# 자동 생성된 마이그레이션 파일에 Black 포맷 적용 (선택)
# hooks = black
# black.type = console_scripts
# black.entrypoint = black
# black.options = -l 100 REVISION_SCRIPT_FILENAME

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
