# Production overrides — use with:
#   docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d --build

services:
  postgres:
    ports: !reset []
    deploy:
      resources:
        limits:
          memory: 1g
          cpus: "1.0"

  chromadb:
    ports: !reset []
    deploy:
      resources:
        limits:
          memory: 1g
          cpus: "0.5"

  redis:
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD:-changeme}
    ports: !reset []
    deploy:
      resources:
        limits:
          memory: 256m
          cpus: "0.25"

  backend:
    environment:
      APP_ENV: production
      DEBUG: "false"
      LOG_LEVEL: ${LOG_LEVEL:-WARNING}
      SECRET_KEY: ${SECRET_KEY:?SECRET_KEY is required in production}
      API_KEY: ${API_KEY:-}
      WEB_CONCURRENCY: ${WEB_CONCURRENCY:-2}
      CORS_ORIGINS: ${CORS_ORIGINS:?CORS_ORIGINS is required in production}
      DATABASE_URL: ${DATABASE_URL:?DATABASE_URL is required in production}
      REDIS_URL: ${REDIS_URL:-redis://:${REDIS_PASSWORD:-changeme}@redis:6379/0}
    ports:
      - "127.0.0.1:${BACKEND_PORT:-8000}:8000"
    healthcheck:
      start_period: 120s
    deploy:
      resources:
        limits:
          memory: 4g
          cpus: "2.0"

  frontend:
    ports:
      - "${FRONTEND_PORT:-80}:80"
    deploy:
      resources:
        limits:
          memory: 128m
          cpus: "0.25"
